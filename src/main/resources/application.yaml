server:
  port: 8080

app:
  upload:
    cover-dir: uploads/covers

spring:
  application:
    name: bookapp
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:bookdb
    username: sa
    password: 1234
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
